<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🕹️ Jessie 的游戏厅</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#14161f;--panel:#1d2029;--line:rgba(255,255,255,.09);
  --ink:#eef0f4;--dim:rgba(238,240,244,.62);--accent:#ffc63d;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Baloo 2','PingFang SC',sans-serif;
  background:
    radial-gradient(1000px 600px at 85% -10%, rgba(255,198,61,.06) 0%, transparent 60%),
    var(--bg);
  color:var(--ink);min-height:100%;padding:32px 22px 64px;
}
.wrap{max-width:920px;margin:0 auto}
header{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:6px;flex-wrap:wrap}
h1{font-size:30px;font-weight:800;letter-spacing:.5px}
h1 .dot{color:var(--accent)}
.userbox{display:flex;align-items:center;gap:10px;font-weight:700;font-size:14px}
.userbox .who{color:var(--dim)}
#logoutBtn{background:transparent;border:1.5px solid var(--line);color:var(--dim);border-radius:12px;padding:6px 12px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer}
#logoutBtn:hover{border-color:rgba(255,255,255,.3);color:var(--ink)}
.sub{color:var(--dim);font-weight:600;margin-bottom:30px;font-size:14.5px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
.card{
  display:block;text-decoration:none;color:var(--ink);
  background:var(--panel);border-radius:18px;border:1.5px solid var(--line);
  padding:22px 22px 18px;position:relative;overflow:hidden;
  transition:transform .16s, border-color .16s, box-shadow .16s;
}
.card:hover{transform:translateY(-4px);border-color:rgba(255,255,255,.22);box-shadow:0 14px 34px rgba(0,0,0,.4)}
.card .emoji{font-size:46px;line-height:1;margin-bottom:12px;display:block;position:relative}
.card h2{font-size:21px;font-weight:800;letter-spacing:.3px;margin-bottom:6px;position:relative}
.card p{font-size:13.5px;font-weight:600;color:var(--dim);line-height:1.55;position:relative}
.card .tags{margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;position:relative}
.tag{font-size:11.5px;font-weight:800;padding:3px 10px;border-radius:999px;letter-spacing:.5px;background:rgba(255,255,255,.08);color:var(--dim)}
.card.soon{opacity:.5;cursor:default;border-style:dashed}
.card.soon:hover{transform:none;border-color:var(--line);box-shadow:none}

/* —— 每个游戏的个性只活在自己的卡片里 —— */
.card.ludo{background:linear-gradient(145deg,#241c4a 0%,#1c1738 100%)}
.card.ludo h2{font-weight:800;color:#f4efe6}
.card.ludo .tag.online{background:rgba(168,230,0,.16);color:#a8e600}
.card.ludo .tag.players{background:rgba(0,205,235,.16);color:#00cdeb}
.card.ludo .splat{position:absolute;right:-34px;top:-34px;width:150px;height:150px;opacity:.16;transition:opacity .16s}
.card.ludo:hover .splat{opacity:.3}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Jessie 的游戏厅<span class="dot">.</span></h1>
    <div class="userbox">
      <span class="who" id="who"></span>
      <button id="logoutBtn">退出</button>
    </div>
  </header>
  <div class="sub">挑一个游戏,叫上朋友一起玩</div>

  <div class="grid">
    <a class="card ludo" href="/games/ludo/">
      <svg class="splat" viewBox="-60 -60 120 120"><path d="M-46,-8 Q-32,-46 -8,-40 Q22,-52 42,-24 Q52,10 30,32 Q0,54 -22,36 Q-52,20 -46,-8 Z" fill="#ff3d8c"/></svg>
      <span class="emoji">🦑</span>
      <h2>SPLAT LUDO!</h2>
      <p>Splatoon 风格的喷墨飞行棋:染地盘、破墨盾、吃子前冲,空位由 CPU 补上。</p>
      <div class="tags">
        <span class="tag online">联机</span>
        <span class="tag players">1-4 人</span>
      </div>
    </a>
    <div class="card soon">
      <span class="emoji">🚧</span>
      <h2>敬请期待</h2>
      <p>下一个小游戏正在路上……</p>
      <div class="tags"><span class="tag">开发中</span></div>
    </div>
  </div>
</div>

<script>
fetch('/api/me').then(r=>{
  if(r.status===401){location.href='/login';return null;}
  return r.json();
}).then(j=>{
  if(j&&j.user)document.getElementById('who').textContent=j.user.display_name;
}).catch(()=>{});
document.getElementById('logoutBtn').onclick=async()=>{
  try{ await fetch('/api/logout',{method:'POST'}); }catch{}
  location.href='/login';
};
</script>
</body>
</html>
