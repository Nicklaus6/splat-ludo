<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册 · Jessie 的游戏厅</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#14161f;--panel:#1d2029;--line:rgba(255,255,255,.09);
  --ink:#eef0f4;--dim:rgba(238,240,244,.62);--accent:#ffc63d;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;}
body{
  font-family:'Baloo 2','PingFang SC',sans-serif;
  background:radial-gradient(1000px 600px at 85% -10%, rgba(255,198,61,.06) 0%, transparent 60%), var(--bg);
  color:var(--ink);min-height:100%;display:flex;align-items:center;justify-content:center;padding:20px;
}
.panel{background:var(--panel);border-radius:20px;padding:38px 42px;max-width:440px;width:100%;border:1.5px solid var(--line);box-shadow:0 24px 60px rgba(0,0,0,.5);}
h1{font-size:26px;font-weight:800;text-align:center;margin-bottom:6px;letter-spacing:.5px;}
h1 .dot{color:var(--accent)}
.sub{color:var(--dim);text-align:center;font-weight:600;margin-bottom:24px;font-size:14px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:700;color:var(--dim);margin-bottom:5px;letter-spacing:.3px}
.field input{
  width:100%;font-family:inherit;font-weight:700;font-size:16px;color:var(--ink);
  background:rgba(0,0,0,.3);border:1.5px solid var(--line);border-radius:12px;
  padding:11px 14px;outline:none;
}
.field input:focus{border-color:var(--accent)}
.field .hint{font-size:11.5px;color:var(--dim);opacity:.8;margin-top:4px}
.err{color:#ff9d9d;font-size:13.5px;font-weight:700;min-height:20px;margin:8px 0 6px;text-align:center}
.bigbtn{
  width:100%;font-family:inherit;font-weight:800;font-size:18px;letter-spacing:1px;color:#1a1405;
  background:var(--accent);border:none;border-radius:14px;padding:13px;cursor:pointer;
  transition:transform .13s, filter .13s;
}
.bigbtn:hover{filter:brightness(1.08)}
.bigbtn:active{transform:translateY(2px)}
.bigbtn:disabled{opacity:.5;cursor:default}
.altline{text-align:center;margin-top:16px;font-size:13.5px;color:var(--dim)}
.altline a{color:var(--accent);font-weight:800;text-decoration:none}
.altline a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="panel">
  <h1>Jessie 的游戏厅<span class="dot">.</span></h1>
  <div class="sub">注册一个账号,所有游戏通用 🕹️</div>
  <form id="f">
    <div class="field"><label>邮箱</label><input name="email" type="email" autocomplete="email" required></div>
    <div class="field"><label>昵称</label><input name="displayName" maxlength="12" required><div class="hint">1-12 字, 游戏里显示的名字</div></div>
    <div class="field"><label>密码</label><input name="password" type="password" minlength="6" autocomplete="new-password" required><div class="hint">至少 6 位</div></div>
    <div class="err" id="err">&nbsp;</div>
    <button class="bigbtn" type="submit" id="btn">注 册</button>
  </form>
  <div class="altline">已有账号? <a href="/login">去登录</a></div>
</div>
<script>
const f=document.getElementById('f'), err=document.getElementById('err'), btn=document.getElementById('btn');
f.onsubmit=async e=>{
  e.preventDefault();
  err.textContent=' ';btn.disabled=true;
  const data=Object.fromEntries(new FormData(f));
  try{
    const r=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    const j=await r.json();
    if(!r.ok){err.textContent=j.error||'注册失败';btn.disabled=false;return;}
    location.href='/';
  }catch(x){err.textContent='网络错误';btn.disabled=false;}
};
</script>
</body>
</html>
